<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AetherKey Vault | Auto-Rotating Password Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'SF Pro Text', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* glassmorphic dashboard card */
        .dashboard {
            max-width: 850px;
            width: 100%;
            background: rgba(12, 20, 30, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            border: 1px solid rgba(72, 187, 255, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.05) inset;
            padding: 2rem 2rem 2.2rem;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #E0F2FE, #7DD3FC, #38BDF8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .title-badge {
            background: rgba(56, 189, 248, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 100px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #7dd3fc;
            border: 0.5px solid #38bdf880;
        }

        .sub {
            color: #8ca3ba;
            margin-top: 0.3rem;
            margin-bottom: 1.8rem;
            font-size: 0.85rem;
            border-left: 3px solid #38bdf8;
            padding-left: 12px;
        }

        /* password display area */
        .password-panel {
            background: #05161fcc;
            border-radius: 1.8rem;
            padding: 0.5rem 1.5rem 0.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border: 1px solid #2c4c6e;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }

        #generatedPassword {
            font-size: 1.6rem;
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            letter-spacing: 1px;
            word-break: break-all;
            color: #eef5ff;
            text-shadow: 0 0 4px #00b4ff40;
            background: transparent;
            border: none;
            width: 70%;
            padding: 1rem 0;
        }

        .copy-btn {
            background: #1e2f3f;
            border: none;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: 600;
            color: #b9e2ff;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
        }

        .copy-btn:hover {
            background: #2b4b6e;
            color: white;
            transform: scale(0.97);
            box-shadow: 0 0 8px #38bdf8;
        }

        /* controls grid */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            background: rgba(3, 12, 22, 0.6);
            padding: 1.2rem 1.5rem;
            border-radius: 1.8rem;
            margin-bottom: 1.5rem;
            justify-content: space-between;
            align-items: center;
        }

        .length-control {
            flex: 2;
            min-width: 150px;
        }

        .length-control label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #9cb6d4;
            margin-bottom: 6px;
        }

        .length-value {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #lengthSlider {
            flex: 1;
            height: 5px;
            border-radius: 10px;
            background: #1f3b4c;
            -webkit-appearance: none;
        }

        #lengthSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #38bdf8;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px cyan;
            border: none;
        }

        #lengthNumber {
            background: #0a1a24;
            width: 70px;
            text-align: center;
            padding: 8px 0;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            border: 1px solid #2c5a74;
            font-family: monospace;
        }

        .toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .toggle-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0b1923;
            padding: 8px 18px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #1f4058;
        }

        .toggle-chip.active {
            background: #1d4d6e;
            border-color: #38bdf8;
            box-shadow: 0 0 5px #38bdf8;
        }

        .toggle-chip input {
            width: 18px;
            height: 18px;
            accent-color: #38bdf8;
            cursor: pointer;
        }

        .toggle-chip label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #cde3fc;
            cursor: pointer;
        }

        /* action area with auto controls */
        .action-area {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .generate-btn {
            background: linear-gradient(95deg, #0f2b3b, #0a4058);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e3f2ff;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #2c84b0;
        }

        .generate-btn:hover {
            background: linear-gradient(95deg, #1e4b66, #0e5d80);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 160, 255, 0.2);
        }

        .stats-badge {
            background: #02121e70;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 0.75rem;
            font-family: monospace;
            color: #b3e4ff;
            border-right: 1px solid #38bdf8;
        }

        /* auto refresh panel */
        .auto-panel {
            background: #030d14a0;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid #1f5a7a;
        }

        .auto-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0b1923;
            padding: 6px 18px;
            border-radius: 60px;
            cursor: pointer;
        }

        .auto-toggle input {
            width: 20px;
            height: 20px;
            accent-color: #38bdf8;
            cursor: pointer;
        }

        .auto-toggle label {
            font-weight: 600;
            color: #cde3fc;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .interval-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0b1923;
            padding: 6px 20px;
            border-radius: 60px;
        }

        .interval-control label {
            font-size: 0.75rem;
            color: #9cb6d4;
            font-weight: 500;
        }

        #intervalMinutes {
            background: #0a1a24;
            border: 1px solid #2c5a74;
            color: white;
            padding: 8px 12px;
            border-radius: 40px;
            width: 80px;
            text-align: center;
            font-weight: bold;
            font-family: monospace;
        }

        .auto-status {
            font-size: 0.7rem;
            background: #1f3b4c;
            padding: 5px 12px;
            border-radius: 40px;
            color: #7dd3fc;
        }

        hr {
            border-color: #1e4b64;
            margin: 0.8rem 0 1rem;
        }

        .history-section {
            margin-top: 0.5rem;
        }

        .history-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7c9ec0;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #historyList {
            background: #030d14a0;
            border-radius: 1.2rem;
            padding: 0.7rem;
            max-height: 140px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            color: #bbdef5;
            border: 0.5px solid #1f5a7a;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #1f4158;
            font-family: monospace;
            word-break: break-all;
        }

        .clear-history {
            background: none;
            border: none;
            color: #ffae70;
            cursor: pointer;
            font-size: 0.7rem;
            text-decoration: underline;
        }

        .badge-unique {
            font-size: 0.6rem;
            background: #1f846030;
            padding: 2px 8px;
            border-radius: 40px;
            color: #8effc4;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f212fd9;
            backdrop-filter: blur(12px);
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #9eeaff;
            border: 1px solid #38bdf8;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 999;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
        <h1>
            ⚡ AetherKey
            <span class="title-badge">Auto-Rotate Vault</span>
        </h1>
        <div class="stats-badge" id="uniqueCounterDisplay">🔐 generated: 0</div>
    </div>
    <div class="sub">✔ zero-collision engine — setiap password unik seumur hidup dashboard · auto ganti sesuai interval</div>

    <!-- generated password field -->
    <div class="password-panel">
        <div id="generatedPassword" style="white-space: pre-wrap;">────────</div>
        <button class="copy-btn" id="copyPasswordBtn">📋 Copy</button>
    </div>

    <!-- controls: length & character sets -->
    <div class="controls">
        <div class="length-control">
            <label>PASSWORD LENGTH (MAX 12)</label>
            <div class="length-value">
                <input type="range" id="lengthSlider" min="4" max="12" value="6" step="1">
                <span id="lengthNumber">6</span>
            </div>
        </div>
        <div class="toggles">
            <div class="toggle-chip" id="numbersToggle">
                <input type="checkbox" id="includeNumbers" checked> <label>🔢 Numbers</label>
            </div>
            <div class="toggle-chip" id="symbolsToggle">
                <input type="checkbox" id="includeSymbols" checked> <label>✨ Symbols</label>
            </div>
            <div class="toggle-chip" id="mixedcaseToggle">
                <input type="checkbox" id="includeMixedCase" checked> <label>🔤 Mixed case</label>
            </div>
        </div>
    </div>

    <!-- AUTO REFRESH PANEL dengan settingan menit -->
    <div class="auto-panel">
        <div class="auto-toggle" id="autoToggleBtn">
            <input type="checkbox" id="autoRefreshCheckbox"> 
            <label>🔄 Auto-Ganti Password</label>
        </div>
        <div class="interval-control">
            <label>⏱️ Interval (menit)</label>
            <input type="number" id="intervalMinutes" min="0.5" max="120" step="0.5" value="20">
            <span style="color:#7dd3fc; font-size:0.7rem;">menit</span>
        </div>
        <div class="auto-status" id="autoStatusText">⏸️ Auto mati</div>
    </div>

    <div class="action-area">
        <button class="generate-btn" id="generateBtn">🎲 Generate Sekarang</button>
        <div class="stats-badge" id="entropyHint">⚡ unique pool aktif</div>
    </div>
    
    <hr>

    <div class="history-section">
        <div class="history-title">
            <span>📜 Riwayat (unik terjamin · last 15)</span>
            <button id="clearHistoryBtn" class="clear-history">clear all</button>
        </div>
        <div id="historyList">
            <div class="history-item" style="opacity:0.6;">✨ Tekan Generate — password unik selamanya</div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg" style="opacity:0;">✓ Tersalin</div>

<script>
    (function() {
        // ---------- GLOBAL UNIQUE SET (tidak akan pernah ada duplicate) ----------
        let globalPasswordSet = new Set();     // semua password yang pernah digenerate
        let generatedHistory = [];              // max 15 untuk UI
        
        // DOM Elements
        const generatedPasswordDiv = document.getElementById("generatedPassword");
        const lengthSlider = document.getElementById("lengthSlider");
        const lengthNumberSpan = document.getElementById("lengthNumber");
        const includeNumbersCB = document.getElementById("includeNumbers");
        const includeSymbolsCB = document.getElementById("includeSymbols");
        const includeMixedCaseCB = document.getElementById("includeMixedCase");
        const generateBtn = document.getElementById("generateBtn");
        const copyBtn = document.getElementById("copyPasswordBtn");
        const historyContainer = document.getElementById("historyList");
        const clearHistoryBtn = document.getElementById("clearHistoryBtn");
        const uniqueCounterDisplay = document.getElementById("uniqueCounterDisplay");
        const entropyHint = document.getElementById("entropyHint");
        const toast = document.getElementById("toastMsg");
        
        // Auto refresh elements
        const autoRefreshCheckbox = document.getElementById("autoRefreshCheckbox");
        const intervalMinutesInput = document.getElementById("intervalMinutes");
        const autoStatusText = document.getElementById("autoStatusText");
        
        // Timer variable
        let autoTimer = null;
        let isAutoEnabled = false;
        
        // Helper: toast message
        let toastTimeout;
        function showMessage(text, isError = false) {
            toast.innerText = text;
            toast.style.opacity = "1";
            toast.style.background = isError ? "#3a1a1ad9" : "#0f212fd9";
            if(toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.opacity = "0";
            }, 2000);
        }
        
        // Update tampilan jumlah unique
        function updateStatsUI() {
            const uniqueCount = globalPasswordSet.size;
            uniqueCounterDisplay.innerText = `🔐 generated: ${uniqueCount}`;
            entropyHint.innerText = uniqueCount >= 10 ? `🌀 ${uniqueCount} unique keys · no repeat` : `⚡ unique pool: ${uniqueCount} passwords`;
        }
        
        // -------- BUILD CHARACTER SET --------
        function buildCharSet(includeNumbers, includeSymbols, includeMixedCase) {
            let lower = "abcdefghijklmnopqrstuvwxyz";
            let upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let numbers = "0123456789";
            let symbols = "!@#$%^&*()_+-=[]{}|;:,.<>?/~`";
            
            let charset = "";
            if(includeMixedCase) {
                charset += lower + upper;
            } else {
                charset += lower;
            }
            if(includeNumbers) charset += numbers;
            if(includeSymbols) charset += symbols;
            
            // fallback safety
            if(charset.length === 0) {
                charset = "abcdefghijklmnopqrstuvwxyz";
                includeMixedCaseCB.checked = false;
            }
            return charset;
        }
        
        // Crypto-secure random
        function getSecureRandomInt(max) {
            const range = max;
            const maxValid = Math.floor(256 / range) * range;
            let randomValue;
            do {
                randomValue = window.crypto.getRandomValues(new Uint8Array(1))[0];
            } while(randomValue >= maxValid);
            return randomValue % range;
        }
        
        function generateRawPassword(length, charset) {
            let password = "";
            const charLen = charset.length;
            for(let i = 0; i < length; i++) {
                const randIndex = getSecureRandomInt(charLen);
                password += charset[randIndex];
            }
            return password;
        }
        
        // ---------- UNIQUE GENERATOR ENGINE (tidak pernah kembar) ----------
        function generateUniquePassword(length, includeNumbers, includeSymbols, includeMixedCase) {
            const charset = buildCharSet(includeNumbers, includeSymbols, includeMixedCase);
            if(charset.length === 0) return "error_charset";
            
            let maxAttempts = 30;
            let attempt = 0;
            let newPassword = "";
            while(attempt < maxAttempts) {
                newPassword = generateRawPassword(length, charset);
                if(!globalPasswordSet.has(newPassword)) {
                    return newPassword;
                }
                attempt++;
            }
            // Fallback super aman: tambahkan suffix incremental tapi tetap unique
            let suffix = 0;
            while(true) {
                let candidate = generateRawPassword(length, charset);
                if(!globalPasswordSet.has(candidate)) return candidate;
                suffix++;
                if(suffix > 50) {
                    // extreme case: inject timestamp pendek
                    const extra = Date.now().toString(36).slice(-3);
                    candidate = candidate.slice(0, length-3) + extra;
                    if(!globalPasswordSet.has(candidate)) return candidate;
                }
            }
        }
        
        // fungsi utama: generate password baru (unik) + update UI + history + reset timer jika auto aktif
        function refreshAndGenerate(showToastMessage = true) {
            const length = parseInt(lengthSlider.value, 10);
            const includeNumbers = includeNumbersCB.checked;
            const includeSymbols = includeSymbolsCB.checked;
            const includeMixedCase = includeMixedCaseCB.checked;
            
            // validasi charset
            const tempSet = buildCharSet(includeNumbers, includeSymbols, includeMixedCase);
            if(tempSet.length === 0) {
                showMessage("⚠️ Pilih minimal satu tipe karakter!", true);
                if(!includeNumbers && !includeSymbols && !includeMixedCase) {
                    includeMixedCaseCB.checked = true;
                    setTimeout(() => refreshAndGenerate(showToastMessage), 10);
                }
                return;
            }
            
            // generate password unique 100%
            let newPassword = generateUniquePassword(length, includeNumbers, includeSymbols, includeMixedCase);
            
            // double safety
            if(globalPasswordSet.has(newPassword)) {
                for(let i=0;i<20;i++) {
                    const fallback = generateRawPassword(length, tempSet);
                    if(!globalPasswordSet.has(fallback)) {
                        newPassword = fallback;
                        break;
                    }
                }
            }
            
            // masukkan ke Set global
            globalPasswordSet.add(newPassword);
            
            // update history (max 15)
            generatedHistory.unshift({
                pwd: newPassword,
                timestamp: new Date().toLocaleTimeString()
            });
            if(generatedHistory.length > 15) generatedHistory.pop();
            
            // tampilkan di dashboard
            generatedPasswordDiv.innerText = newPassword;
            
            // render history
            renderHistory();
            updateStatsUI();
            
            if(showToastMessage) {
                showMessage(`✓ Password baru (total ${globalPasswordSet.size} unik)`, false);
            }
            
            // Jika mode auto menyala, reset timer agar interval baru terhitung sejak generate terakhir
            resetAutoTimer();
        }
        
        // render history dengan badge unique
        function renderHistory() {
            if(generatedHistory.length === 0) {
                historyContainer.innerHTML = `<div class="history-item" style="opacity:0.6;">✨ Belum ada password — tekan Generate</div>`;
                return;
            }
            let html = "";
            for(let i = 0; i < generatedHistory.length; i++) {
                const entry = generatedHistory[i];
                let displayPwd = entry.pwd;
                if(displayPwd.length > 40) {
                    displayPwd = displayPwd.slice(0, 28) + "…" + displayPwd.slice(-8);
                }
                html += `
                    <div class="history-item">
                        <span style="font-family: monospace; word-break:break-all;">${escapeHtml(displayPwd)}</span>
                        <span style="display: flex; gap: 6px;">
                            <span class="badge-unique">✓ unik</span>
                            <span style="font-size:0.65rem; color:#7ea6c2;">${entry.timestamp}</span>
                        </span>
                    </div>
                `;
            }
            historyContainer.innerHTML = html;
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        function clearHistoryOnly() {
            generatedHistory = [];
            renderHistory();
            showMessage("Riwayat dihapus, tapi uniqueness vault tetap utuh (tidak akan ada duplicate)", false);
            updateStatsUI();
        }
        
        // -------- AUTO REFRESH LOGIC with CUSTOMIZABLE MINUTES ----------
        function startAutoRefresh() {
            if(autoTimer) clearInterval(autoTimer);
            let intervalMinutes = parseFloat(intervalMinutesInput.value);
            if(isNaN(intervalMinutes) || intervalMinutes <= 0) intervalMinutes = 20;
            if(intervalMinutes < 0.5) intervalMinutes = 0.5;
            if(intervalMinutes > 120) intervalMinutes = 120;
            intervalMinutesInput.value = intervalMinutes;
            
            const intervalMs = intervalMinutes * 60 * 1000;
            autoTimer = setInterval(() => {
                if(isAutoEnabled) {
                    // auto generate password baru tanpa menampilkan toast berlebihan (opsional kasih notif ringan)
                    refreshAndGenerate(true);
                }
            }, intervalMs);
            autoStatusText.innerText = `🟢 Auto aktif · setiap ${intervalMinutes} menit`;
            autoStatusText.style.color = "#8effc4";
        }
        
        function stopAutoRefresh() {
            if(autoTimer) {
                clearInterval(autoTimer);
                autoTimer = null;
            }
            autoStatusText.innerText = `⏸️ Auto mati`;
            autoStatusText.style.color = "#7dd3fc";
        }
        
        function resetAutoTimer() {
            if(isAutoEnabled) {
                // restart timer agar interval dihitung ulang sejak generate terakhir
                if(autoTimer) clearInterval(autoTimer);
                let intervalMinutes = parseFloat(intervalMinutesInput.value);
                if(isNaN(intervalMinutes) || intervalMinutes <= 0) intervalMinutes = 20;
                if(intervalMinutes < 0.5) intervalMinutes = 0.5;
                const intervalMs = intervalMinutes * 60 * 1000;
                autoTimer = setInterval(() => {
                    if(isAutoEnabled) {
                        refreshAndGenerate(true);
                    }
                }, intervalMs);
                autoStatusText.innerText = `🟢 Auto aktif · setiap ${intervalMinutes} menit (reset)`;
            }
        }
        
        function setAutoMode(enable) {
            isAutoEnabled = enable;
            autoRefreshCheckbox.checked = enable;
            if(enable) {
                if(autoTimer) clearInterval(autoTimer);
                startAutoRefresh();
                showMessage(`Auto refresh diaktifkan — akan ganti tiap ${intervalMinutesInput.value} menit`, false);
            } else {
                stopAutoRefresh();
                showMessage("Auto refresh dimatikan", false);
            }
        }
        
        // event listener untuk toggle auto
        function bindAutoEvents() {
            autoRefreshCheckbox.addEventListener("change", (e) => {
                setAutoMode(e.target.checked);
            });
            
            intervalMinutesInput.addEventListener("change", () => {
                let val = parseFloat(intervalMinutesInput.value);
                if(isNaN(val)) val = 20;
                val = Math.min(120, Math.max(0.5, val));
                intervalMinutesInput.value = val;
                if(isAutoEnabled) {
                    // restart timer dengan interval baru
                    if(autoTimer) clearInterval(autoTimer);
                    startAutoRefresh();
                    showMessage(`Interval auto diubah menjadi ${val} menit`, false);
                }
            });
        }
        
        // sync length slider
        function syncLength() {
            let val = parseInt(lengthSlider.value, 10);
            lengthNumberSpan.innerText = val;
        }
        
        async function copyPassword() {
            const pwd = generatedPasswordDiv.innerText;
            if(!pwd || pwd === "────────") {
                showMessage("Tidak ada password untuk disalin", true);
                return;
            }
            try {
                await navigator.clipboard.writeText(pwd);
                showMessage("🔒 Password disalin ke clipboard!", false);
            } catch(e) {
                showMessage("Gagal menyalin", true);
            }
        }
        
        // inisialisasi dashboard: password pertama default length = 6, unique, max 12
        function initDashboard() {
            // set max slider 12
            lengthSlider.max = 12;
            lengthSlider.min = 4;
            lengthSlider.value = "6";
            lengthNumberSpan.innerText = "6";
            
            // generate initial password unik (panjang 6, dengan angka, simbol, mixed case)
            const initLength = 6;
            const initNumbers = true;
            const initSymbols = true;
            const initMixed = true;
            const charsetInit = buildCharSet(initNumbers, initSymbols, initMixed);
            let firstPwd = "";
            for(let i=0; i<initLength; i++) {
                firstPwd += charsetInit[getSecureRandomInt(charsetInit.length)];
            }
            // pastikan unik (set masih kosong)
            globalPasswordSet.add(firstPwd);
            generatedHistory.unshift({ pwd: firstPwd, timestamp: new Date().toLocaleTimeString() });
            generatedPasswordDiv.innerText = firstPwd;
            renderHistory();
            updateStatsUI();
            
            // event listeners
            lengthSlider.addEventListener("input", () => {
                syncLength();
            });
            generateBtn.addEventListener("click", () => {
                refreshAndGenerate(true);
            });
            copyBtn.addEventListener("click", copyPassword);
            clearHistoryBtn.addEventListener("click", clearHistoryOnly);
            bindAutoEvents();
            
            // default auto mati
            setAutoMode(false);
        }
        
        initDashboard();
    })();
</script>
</body>
</html>
